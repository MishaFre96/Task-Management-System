# Base de datos H2 en archivo (persistente)
spring.datasource.url=jdbc:h2:file:../tms_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# Hibernate actualiza las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Consola web de H2 (para ver la base de datos en el navegador)
spring.h2.console.enabled=true
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# Actuator: permite usar el endpoint de shutdown para los tests
management.endpoints.web.exposure.include=*
management.endpoint.shutdown.enabled=true
